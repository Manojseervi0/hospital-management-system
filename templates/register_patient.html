{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center align-items-center">

    <div class="col-md-6 col-lg-5">

        <div class="card p-4 border-0 shadow-lg">

            <h2 class="mb-4 text-center text-success">
                Patient Registration
            </h2>

            <form method="POST"
                  name="patientForm"
                  onsubmit="return validatePatientForm()">

                <!-- Username -->
                <div class="mb-3">

                    <label class="form-label fw-semibold">
                        Username
                    </label>

                    <input type="text"
                           name="username"
                           class="form-control"
                           placeholder="Enter username"
                           minlength="3"
                           required>

                </div>

                <!-- Password -->
                <div class="mb-3">

                    <label class="form-label fw-semibold">
                        Password
                    </label>

                    <input type="password"
                           name="password"
                           class="form-control"
                           placeholder="Enter password"
                           minlength="4"
                           required>

                </div>

                <!-- Full Name -->
                <div class="mb-3">

                    <label class="form-label fw-semibold">
                        Full Name
                    </label>

                    <input type="text"
                           name="full_name"
                           class="form-control"
                           placeholder="Enter full name">

                </div>

                <!-- Phone -->
                <div class="mb-3">

                    <label class="form-label fw-semibold">
                        Phone Number
                    </label>

                    <input type="text"
                           name="phone"
                           class="form-control"
                           placeholder="Enter 10-digit phone number"
                           pattern="[0-9]{10}"
                           maxlength="10"
                           required>

                </div>

                <!-- Age -->
                <div class="mb-4">

                    <label class="form-label fw-semibold">
                        Age
                    </label>

                    <input type="number"
                           name="age"
                           class="form-control"
                           placeholder="Enter age"
                           min="1"
                           max="120"
                           required>

                </div>

                <!-- Register Button -->
                <div class="d-grid">

                    <button type="submit"
                            class="btn btn-success">

                        Register

                    </button>

                </div>

            </form>

            <!-- Login Link -->
            <p class="mt-4 text-center">

                Already have an account?

                <a href="{{ url_for('login') }}"
                   class="text-decoration-none fw-semibold">

                    Login here

                </a>

            </p>

        </div>

    </div>

</div>

{% endblock %}
