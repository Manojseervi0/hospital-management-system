{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center align-items-center">

    <div class="col-md-5 col-lg-4">

        <div class="card p-4 border-0 shadow-lg">

            <h2 class="mb-4 text-center text-primary">
                HMS Login
            </h2>

            <form method="POST">

                <!-- Username -->
                <div class="mb-3">

                    <label class="form-label fw-semibold">
                        Username
                    </label>

                    <input type="text"
                           name="username"
                           class="form-control"
                           placeholder="Enter username"
                           minlength="3"
                           required>

                </div>

                <!-- Password -->
                <div class="mb-3">

                    <label class="form-label fw-semibold">
                        Password
                    </label>

                    <input type="password"
                           name="password"
                           class="form-control"
                           placeholder="Enter password"
                           minlength="4"
                           required>

                </div>

                <!-- Login Button -->
                <div class="d-grid">

                    <button type="submit"
                            class="btn btn-primary">

                        Login

                    </button>

                </div>

            </form>

            <!-- Register Link -->
            <p class="mt-4 text-center">

                New here?

                <a href="{{ url_for('register_patient') }}"
                   class="text-decoration-none fw-semibold">

                    Register as Patient

                </a>

            </p>

        </div>

    </div>

</div>

{% endblock %}
